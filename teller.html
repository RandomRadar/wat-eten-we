<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagen Teller | RandomRadar</title>
    <style>
        :root { --primary: #f36d21; --dark: #2c3e50; }
        body { font-family: sans-serif; background: #f5f5f5; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        nav { background: white; width: 100%; padding: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        nav a { text-decoration: none; color: var(--dark); font-weight: bold; font-size: 0.85rem; padding: 8px 12px; border-radius: 5px; }
        nav a.active { background: var(--primary); color: white; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; margin-top: 40px; border-top: 5px solid var(--primary); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .res { margin-top: 20px; font-weight: bold; color: var(--primary); display: none; }
    </style>
</head>
<body>
<nav>
    <a href="index.html">🍴 Eten</a>
    <a href="teller.html" class="active">📅 Teller</a>
    <a href="wie.html">🎯 Wie?</a>
</nav>
<div class="card">
    <h1>Dagen Teller 📅</h1>
    <input type="date" id="start">
    <input type="date" id="eind">
    <button onclick="reken()">BEREKEN</button>
    <div id="out" class="res"></div>
</div>
<script>
    document.getElementById('start').valueAsDate = new Date();
    function reken() {
        const s = new Date(document.getElementById('start').value);
        const e = new Date(document.getElementById('eind').value);
        const diff = Math.ceil((e - s) / (1000 * 60 * 60 * 24));
        const out = document.getElementById('out');
        out.innerText = "Totaal dagen: " + diff;
        out.style.display = 'block';
    }
</script>
</body>
</html>
