<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wat Eten We? | RandomRadar</title>
    <style>
        :root { --primary: #f36d21; --dark: #2c3e50; }
        body { font-family: sans-serif; background: #f5f5f5; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Het Menu */
        nav { background: white; width: 100%; padding: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; z-index: 100; }
        nav a { text-decoration: none; color: var(--dark); font-weight: bold; font-size: 0.9rem; padding: 8px 15px; border-radius: 5px; transition: 0.3s; }
        nav a.active { background: var(--primary); color: white; }
        nav a:hover:not(.active) { background: #eee; }

        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; margin-top: 50px; border-top: 5px solid var(--primary); }
        h1 { color: var(--dark); margin-bottom: 20px; }
        #resultaat { font-size: 1.5rem; font-weight: bold; color: var(--primary); min-height: 1.5em; margin: 20px 0; }
        button { background: var(--primary); color: white; border: none; padding: 15px 30px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #d35400; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="active">🍴 Wat eten we?</a>
    <a href="teller.html">📅 Dagen Teller</a>
</nav>

<div class="card">
    <h1>Wat eten we? 🍴</h1>
    <div id="resultaat">Klik op de knop!</div>
    <button onclick="kiesEten()">GENEREER MAALTIJD</button>
</div>

<script>
    const opties = ["Pizza 🍕", "Pasta 🍝", "Sushi 🍣", "Frietjes 🍟", "Slaatje 🥗", "Taco's 🌮", "Wok 🥢", "Pannenkoeken 🥞", "Burgers 🍔", "Stoemp met worst 🥘"];
    function kiesEten() {
        const r = document.getElementById("resultaat");
        r.innerText = "De radar draait...";
        setTimeout(() => {
            const keuze = opties[Math.floor(Math.random() * opties.length)];
            r.innerText = keuze;
        }, 500);
    }
</script>

</body>
</html>
