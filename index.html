<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wat eten we vanavond? - De Willekeurige Eten Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 { color: #ff4757; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { color: #7f8c8d; margin-bottom: 1.5rem; }
        #resultaat-box {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            border: 3px dashed #ff4757;
            border-radius: 15px;
            background-color: #fffafb;
        }
        #uitkomst { font-size: 1.4rem; font-weight: bold; color: #2f3542; padding: 0 10px; }
        
        .main-btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }
        .main-btn:hover { background-color: #ff6b81; transform: scale(1.05); }

        /* De WhatsApp knop (staat eerst verborgen) */
        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            display: none; 
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2);
            text-decoration: none;
        }
        .whatsapp-btn:hover { transform: scale(1.05); background-color: #20bd5a; }

        .seo-section { margin-top: 3rem; max-width: 600px; padding: 20px; text-align: left; font-size: 0.9rem; line-height: 1.6; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>Wat eten we vanavond? 🍽️</h1>
    <p class="subtitle">Geen inspiratie? Onze generator beslist voor jou.</p>
    
    <div id="resultaat-box">
        <p id="uitkomst">Klaar om te kiezen?</p>
    </div>

    <button class="main-btn" onclick="kiesEten()">Beslis voor mij!</button>
    
    <div id="share-container">
        <button id="share-btn" class="whatsapp-btn" onclick="deelViaWhatsapp()">Stuur naar partner 📱</button>
    </div>
</div>

<section class="seo-section">
    <h2>Geen inspiratie voor het avondeten?</h2>
    <p>
        Iedere dag is het weer dezelfde vraag: <strong>"Wat eten we vanavond?"</strong>. Onze 
        <strong>wat eten we generator</strong> helpt je direct uit de brand met <em>snel en makkelijk eten</em>.
    </p>
</section>

<script>
    function kiesEten() {
        const opties = [
            "Pizza 🍕", "Verse Pasta 🍝", "Sushi 🍣", "Gezonde Salade 🥗", 
            "Frietjes van de frituur 🍟", "Burgers 🍔", "Thais bestellen 🍛", 
            "Stamppot 🥔", "Pannenkoeken 🥞", "Taco's 🌮"
        ];

        const display = document.getElementById('uitkomst');
        const shareBtn = document.getElementById('share-btn');
        const mainBtn = document.querySelector('.main-btn');
        
        mainBtn.disabled = true;
        let count = 0;
        const interval = setInterval(() => {
            display.innerText = opties[Math.floor(Math.random() * opties.length)];
            count++;
            if (count > 12) {
                clearInterval(interval);
                const finale = Math.floor(Math.random() * opties.length);
                display.innerText = opties[finale];
                mainBtn.disabled = false;
                shareBtn.style.display = 'inline-block'; // Laat de deelknop zien
            }
        }, 60);
    }

    function deelViaWhatsapp() {
        const keuze = document.getElementById('uitkomst').innerText;
        const tekst = "Het lot heeft beslist! We eten vanavond: " + keuze + ". Bekijk het hier: " + window.location.href;
        const url = "https://wa.me/?text=" + encodeURIComponent(tekst);
        window.open(url, '_blank');
    }
</script>

</body>
</html>
