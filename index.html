<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wie Moet Het Doen? | RandomRadar</title>
    <style>
        :root { --primary: #f36d21; --dark: #2c3e50; }
        body { font-family: sans-serif; background: #f5f5f5; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        nav { background: white; width: 100%; padding: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
        nav a { text-decoration: none; color: var(--dark); font-weight: bold; font-size: 0.85rem; padding: 8px 12px; border-radius: 5px; transition: 0.3s; }
        nav a.active { background: var(--primary); color: white; }
        nav a:hover:not(.active) { background: #eee; }

        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; margin-top: 40px; border-top: 5px solid var(--primary); }
        h1 { color: var(--dark); font-size: 1.5rem; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 2px solid #eee; border-radius: 8px; font-family: inherit; margin-bottom: 15px; box-sizing: border-box; resize: none; }
        #winnaar { font-size: 1.8rem; font-weight: bold; color: var(--primary); min-height: 1.5em; margin: 20px 0; }
        button { background: var(--primary); color: white; border: none; padding: 15px; font-size: 1.1rem; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">🍴 Eten</a>
    <a href="teller.html">📅 Teller</a>
    <a href="wie.html" class="active">🎯 Wie?</a>
</nav>

<div class="card">
    <h1>Wie Moet Het Doen? 🎯</h1>
    <p style="font-size: 0.8rem; color: #777;">Typ de namen (met een komma ertussen):</p>
    <textarea id="namenLijst" placeholder="Jan, Piet, Marie, ..."></textarea>
    <div id="winnaar">Wie wordt het?</div>
    <button onclick="lootNamen()">START DE RADAR</button>
</div>

<script>
    function lootNamen() {
        const input = document.getElementById("namenLijst").value;
        const resultaat = document.getElementById("winnaar");
        
        const namen = input.split(',').map(n => n.trim()).filter(n => n !== "");
        
        if (namen.length < 2) {
            alert("Voer minstens 2 namen in!");
            return;
        }

        resultaat.innerText = "De radar zoekt...";
        setTimeout(() => {
            const gekozen = namen[Math.floor(Math.random() * namen.length)];
            resultaat.innerText = "👉 " + gekozen + "!";
        }, 800);
    }
</script>

</body>
</html>
